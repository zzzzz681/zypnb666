server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: resume-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:aijianli}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1
      connection-timeout: 30000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

security:
  jwt:
    secret: ${JWT_SECRET:AIJianLiSecretKeyForJwtTokenGenerate2026}
    expire-hours: 24

ai:
  default-provider: deepseek
  deepseek:
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    api-key: ${DEEPSEEK_API_KEY:}
    enabled: ${DEEPSEEK_ENABLED:true}
    rate-limit-per-minute: 60
  openai:
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    api-key: ${OPENAI_API_KEY:}
    enabled: ${OPENAI_ENABLED:true}
    rate-limit-per-minute: 60

storage:
  endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
  access-key: ${STORAGE_ACCESS_KEY:minioadmin}
  secret-key: ${STORAGE_SECRET_KEY:minioadmin}
  bucket-resume: ${STORAGE_BUCKET_RESUME:aijianli-resume}
  bucket-report: ${STORAGE_BUCKET_REPORT:aijianli-report}
  bucket-template: ${STORAGE_BUCKET_TEMPLATE:aijianli-template}
